<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>應用電腦視覺技術之臺灣鹿發情監測與繁殖管理系統 - 鹿隻資料登記</title>
    <script src="auth-guard.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f2efea; }
        .sidebar-bg { background-color: #8B6B4D; }
        .form-card { background-color: #ffffff; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-field { width: 100%; padding: 0.65rem 1rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; transition: all 0.2s; }
        .input-field:focus { outline: none; border-color: #8B6B4D; ring: 2px; ring-color: #fcd34d; }
        .submit-btn { width: 100%; background-color: #facc15; color: #1f2937; padding: 0.8rem; border-radius: 0.5rem; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 6px -1px rgba(250, 204, 21, 0.2); }
        .submit-btn:hover { background-color: #eab308; }
        label { display: block; font-size: 0.875rem; color: #4b5563; margin-bottom: 0.35rem; font-weight: 600; }
    </style>
</head>
<body class="font-sans text-gray-700">

    <header class="sidebar-bg text-white shadow-md sticky top-0 z-50">
        <div class="px-4 md:px-6 h-20 flex items-center justify-between">
            <h1 class="text-base md:text-lg font-bold leading-tight">臺灣鹿發情監測與繁殖管理系統</h1>
            <nav class="hidden xl:flex space-x-8 text-sm font-medium">
                <a href="index.html" class="nav-link flex items-center"><i class="fa-solid fa-house mr-2 text-xs"></i>首頁</a>
                <a href="2.html" class="nav-link flex items-center">鹿舍總覽</a>
                <a href="3.html" class="nav-active flex items-center">鹿隻履歷登記</a>
                <a href="4.html" class="nav-link flex items-center">發情記錄管理</a>
            </nav>
            <div class="flex items-center space-x-4 border-l border-white/20 pl-6 cursor-pointer" onclick="logoutSystem()">
                <span class="text-sm font-bold uppercase id-user-name">李仲琨</span>
            </div>
        </div>
        <div class="flex xl:hidden bg-[#72563D] text-xs font-bold justify-around py-2.5 border-t border-white/10">
            <a href="index.html" class="opacity-80 px-2 text-white">環境數據</a>
            <a href="2.html" class="opacity-80 px-2 text-white">鹿舍總覽</a>
            <a href="3.html" class="text-shadow-sm border-b-2 border-[#fcd34d] pb-0.5 px-2 text-[#fcd34d]">履歷登記</a>
            <a href="4.html" class="opacity-80 px-2 text-white">發情管理</a>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 md:p-8">
        <div class="form-card p-5 md:p-12">
            <form id="profileForm" class="space-y-5 md:space-y-6">
                <div><label class="block text-sm font-bold mb-1">鹿隻識別碼 (耳標/晶片號)</label><input type="text" id="deer_id" required class="input-field" placeholder="例如: 0x8183"></div>
                <div><label class="block text-sm font-bold mb-1">實測體重數據 (公斤)</label><input type="number" step="0.01" id="weight" required class="input-field" placeholder="請輸入體重數據"></div>
                <div><label class="block text-sm font-bold mb-1">出生日期紀錄</label><input type="date" id="birthday" required class="input-field"></div>
                <div><label class="block text-sm font-bold mb-1">性別分類</label><select id="gender" class="input-field bg-white"><option value="母鹿">母鹿</option><option value="公鹿">公鹿</option></select></div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:grid-cols-2 md:gap-6">
                    <div><label class="block text-sm font-bold mb-1">遺傳親代：父畜耳標</label><select id="father_id" class="input-field bg-white"><option value="無">無歷史紀錄</option></select></div>
                    <div><label class="block text-sm font-bold mb-1">遺傳親代：母畜耳標</label><select id="mother_id" class="input-field bg-white"><option value="無">無歷史紀錄</option></select></div>
                </div>
                
                <div><label class="block text-sm font-bold mb-1">累計繁育成功胎次 (次)</label><input type="number" id="breeding_count" class="input-field" value="0" min="0"></div>
                <div><label class="block text-sm font-bold mb-1">指定配置管理欄位</label><select id="pen_id" class="input-field bg-white"><option value="A1">A1 欄位 (公鹿區)</option><option value="B1">B1 欄位 (母鹿區)</option><option value="C1">C1 欄位 (隔離區)</option></select></div>
                
                <div class="pt-2"><button type="submit" class="submit-btn transition text-sm md:text-base">送出履歷並同步至 Supabase 雲端</button></div>
            </form>
        </div>
    </main>

    <script>
        document.querySelectorAll('.id-user-name').forEach(el => {
            el.innerText = localStorage.getItem('deer_user') || "李仲琨";
        });

        const API_BASE = "https://deer-backend-api-t940.onrender.com";

        async function populateParentsDropdown() {
            try {
                const res = await fetch(`${API_BASE}/deer`);
                const list = await res.json();
                const fDropdown = document.getElementById('father_id');
                const mDropdown = document.getElementById('mother_id');

                list.forEach(deer => {
                    const opt = document.createElement('option');
                    opt.value = deer.deer_id; opt.innerText = `鹿隻 ${deer.deer_id}`;
                    if(deer.gender === "公鹿") fDropdown.appendChild(opt);
                    else mDropdown.appendChild(opt.cloneNode(true));
                });
            } catch (e) { console.error("加載血統樹失敗:", e); }
        }

        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                deer_id: document.getElementById('deer_id').value,
                weight: parseFloat(document.getElementById('weight').value),
                birthday: document.getElementById('birthday').value,
                gender: document.getElementById('gender').value,
                father_id: document.getElementById('father_id').value == "無" ? null : document.getElementById('father_id').value,
                mother_id: document.getElementById('mother_id').value == "無" ? null : document.getElementById('mother_id').value,
                breeding_count: parseInt(document.getElementById('breeding_count').value) || 0,
                pen_id: document.getElementById('pen_id').value
            };

            try {
                const res = await fetch(`${API_BASE}/deer`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    alert("🎉 台灣茸鹿資料已無縫寫入 Supabase 雲端生產環境！");
                    document.getElementById('profileForm').reset();
                    location.reload();
                } else { alert("寫入發生衝突，請檢查欄位。"); }
            } catch (err) { alert("無法連線至 Render 雲端後端。"); }
        };

        populateParentsDropdown();
    </script>
</body>
</html>
