<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>應用電腦視覺技術之臺灣鹿發情監測與繁殖管理系統 - 發情記錄管理</title>
    <script src="auth-guard.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f2efea; }
        .sidebar-bg { background-color: #8B6B4D; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="font-sans text-gray-700">

    <header class="sidebar-bg text-white shadow-md sticky top-0 z-50">
        <div class="px-4 md:px-6 h-20 flex items-center justify-between">
            <h1 class="text-base md:text-lg font-bold">臺灣鹿發情監測與繁殖管理系統</h1>
            <nav class="hidden xl:flex space-x-8 text-sm font-medium">
                <a href="index.html" class="nav-link flex items-center"><i class="fa-solid fa-house mr-2 text-xs"></i>首頁</a>
                <a href="2.html" class="nav-link flex items-center">鹿舍總覽</a>
                <a href="3.html" class="nav-link flex items-center">鹿隻履歷登記</a>
                <a href="4.html" class="nav-active flex items-center">發情記錄管理</a>
            </nav>
            <div class="flex items-center space-x-4 border-l border-white/20 pl-6 text-right cursor-pointer" onclick="logoutSystem()">
                <span class="text-sm font-bold uppercase id-user-name">李仲琨</span>
            </div>
        </div>
        <div class="flex xl:hidden bg-[#72563D] text-xs font-bold justify-around py-2.5 border-t border-white/10">
            <a href="index.html" class="opacity-80 px-2 text-white">環境數據</a>
            <a href="2.html" class="opacity-80 px-2 text-white">鹿舍總覽</a>
            <a href="3.html" class="opacity-80 px-2 text-white">履歷登記</a>
            <a href="4.html" class="text-shadow-sm border-b-2 border-[#fcd34d] pb-0.5 px-2 text-[#fcd34d]">發情管理</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-6 md:mb-10 text-center">
            <div class="bg-white p-3 md:p-6 rounded-2xl card-shadow border-b-4 border-red-400">
                <p class="text-[9px] md:text-[11px] text-gray-400 font-bold mb-1 md:mb-2 uppercase tracking-wider">今日爬跨 (Mounting)</p>
                <p id="stat-m" class="text-xl md:text-3xl font-black text-red-500">0 次</p>
            </div>
            <div class="bg-white p-3 md:p-6 rounded-2xl card-shadow border-b-4 border-amber-400">
                <p class="text-[9px] md:text-[11px] text-gray-400 font-bold mb-1 md:mb-2 uppercase tracking-wider">站立發情 (Standing)</p>
                <p id="stat-s" class="text-xl md:text-3xl font-black text-amber-500">0 次</p>
            </div>
            <div class="bg-white p-3 md:p-6 rounded-2xl card-shadow border-b-4 border-blue-400">
                <p class="text-[9px] md:text-[11px] text-gray-400 font-bold mb-1 md:mb-2 uppercase tracking-wider">雄性追隨 (FO)</p>
                <p id="stat-f" class="text-xl md:text-3xl font-black text-blue-500">0 次</p>
            </div>
            <div class="bg-white p-3 md:p-6 rounded-2xl card-shadow border-b-4 border-green-500">
                <p class="text-[9px] md:text-[11px] text-gray-400 font-bold mb-1 md:mb-2 uppercase tracking-wider">即時綜合活動量</p>
                <p id="stat-idx" class="text-xl md:text-3xl font-black text-green-600">8,542</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
            <div class="lg:col-span-2 bg-white p-4 md:p-8 rounded-2xl card-shadow">
                <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 sm:gap-0 mb-6 md:mb-10">
                    <h2 class="text-base md:text-xl font-bold text-gray-800">活動量波動趨勢圖</h2>
                    <div class="flex items-center space-x-2 text-xs md:text-sm">
                        <label class="text-gray-400 whitespace-nowrap">對象：</label>
                        <select id="deerFilter" class="bg-amber-50 border border-amber-200 text-[#8B6B4D] font-bold rounded-lg px-2.5 py-1.5 outline-none cursor-pointer w-full sm:w-auto"></select>
                    </div>
                </div>
                <div id="activityChart" class="w-full" style="height: 280px; md:height: 400px;"></div>
            </div>

            <div class="bg-white p-4 md:p-6 rounded-2xl card-shadow border-l-4 border-[#8B6B4D] flex flex-col justify-between">
                <div>
                    <h2 class="text-base md:text-lg font-bold mb-4 flex items-center"><i class="fa-solid fa-list-ul mr-2 md:mr-3 text-[#8B6B4D]"></i>YOLO 電腦視覺監測流</h2>
                    <div class="space-y-3 h-[260px] md:h-[340px] overflow-y-auto pr-1 font-sans" id="liveLogStream"></div>
                </div>
                <button id="agentBtn" class="w-full mt-4 py-3 md:py-4 bg-[#8B6B4D] text-white rounded-xl text-xs md:text-sm font-bold shadow-lg hover:bg-[#72563D] transition">調度 AI Agent 產出行為專家報告</button>
            </div>
        </div>
    </main>

    <div id="agentModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-lg p-5 md:p-8 rounded-3xl shadow-2xl border-t-8 border-[#8B6B4D] animate-fadeIn">
            <div class="flex items-center space-x-2.5 mb-4 text-[#8B6B4D] text-base md:text-xl font-black">
                <i class="fa-solid fa-robot text-xl md:text-2xl animate-bounce"></i><h3>AI 專家智能診斷</h3>
            </div>
            <div id="agentText" class="text-xs md:text-sm text-gray-600 leading-relaxed whitespace-pre-line bg-gray-50 p-4 md:p-5 rounded-2xl border border-gray-100 max-h-60 overflow-y-auto font-medium"></div>
            <button onclick="document.getElementById('agentModal').classList.add('hidden')" class="w-full mt-5 py-3 bg-gray-800 text-white font-bold rounded-xl text-xs md:text-sm hover:bg-gray-900 transition">關閉報告並返回</button>
        </div>
    </div>

    <script>
        document.querySelectorAll('.id-user-name').forEach(el => {
            el.innerText = localStorage.getItem('deer_user') || "李仲琨";
        });

        const API_BASE = "https://deer-backend-api-t940.onrender.com/api";
        const activityChart = echarts.init(document.getElementById('activityChart'));

        activityChart.setOption({
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '4%', bottom: '5%', containLabel: true },
            xAxis: { type: 'category', data: ['06/09', '06/10', '06/11', '06/12', '06/13', '06/14', '06/15'] },
            yAxis: { type: 'value', min: 0, max: 300 },
            series: [{ name: '個別活動指數', type: 'line', data: [112, 108, 125, 118, 121, 115, 110], smooth: true, lineStyle: { color: '#10b981', width: 3 } }]
        });

        async function pollRealtimeMetrics() {
            try {
                const resEstrusStats = await fetch(`${API_BASE}/estrus/stats`);
                const stats = await resEstrusStats.json();
                
                document.getElementById('stat-m').innerText = `${stats.mounting_count} 次`;
                document.getElementById('stat-s').innerText = `${stats.standing_count} 次`;
                document.getElementById('stat-f').innerText = `${stats.fo_count} 次`;
                document.getElementById('stat-idx').innerText = stats.total_activity_index.toLocaleString();

                const resEstrusLogs = await fetch(`${API_BASE}/estrus/logs`);
                const logs = await resEstrusLogs.json();
                const logBox = document.getElementById('liveLogStream');
                
                logBox.innerHTML = logs.map(l => `
                    <div class="p-2.5 bg-blue-50/60 rounded-xl border border-blue-100/40 text-[11px] md:text-xs">
                        <div class="flex justify-between font-bold text-blue-600 mb-1">
                            <span>${l.behavior_type=='Mounting'?'爬跨(Mounting)':l.behavior_type=='Standing'?'站立(Standing)':l.behavior_type=='FO'?'追隨(FO)':l.behavior_type}</span>
                            <span class="text-gray-400 font-mono">${l.time}</span>
                        </div>
                        <p class="text-gray-700 font-semibold">耳標號: ${l.deer_id}</p>
                        <p class="text-gray-400 text-[10px]">持續時間: ${l.duration} 秒</p>
                    </div>`).join('');
            } catch (e) { console.error("輪詢資料失敗:", e); }
        }

        async function bindDeerFilter() {
            try {
                const res = await fetch(`${API_BASE}/deer`);
                const list = await res.json();
                const sel = document.getElementById('deerFilter');
                sel.innerHTML = "";
                list.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.deer_id; opt.innerText = `鹿隻 ${d.deer_id} (${d.gender})`;
                    sel.appendChild(opt);
                });
            } catch (e) { console.error("綁定過濾選單失敗:", e); }
        }

        document.getElementById('agentBtn').onclick = async () => {
            const deerId = document.getElementById('deerFilter').value;
            if(!deerId) return;
            const btn = document.getElementById('agentBtn');
            btn.innerText = "正在分析行為特徵..."; btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/ai/analyze/${deerId}`, { method: 'POST' });
                const data = await res.json();
                document.getElementById('agentText').innerText = data.report;
                document.getElementById('agentModal').classList.remove('hidden');
            } catch (err) { alert("AI Agent 連線超時。"); }
            finally { btn.innerText = "調度 AI Agent 產出行為專家報告"; btn.disabled = false; }
        };

        bindDeerFilter();
        pollRealtimeMetrics();
        // 維持原汁原味的 4 秒定時自動重新整理輪詢
        setInterval(pollRealtimeMetrics, 4000);
        window.addEventListener('resize', () => { activityChart.resize(); });
    </script>
</body>
</html>
