<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>應用電腦視覺技術之臺灣鹿發情監測與繁殖管理系統 - 發情記錄管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f2efea; }
        .sidebar-bg { background-color: #8B6B4D; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="font-sans text-gray-700">

    <header class="sidebar-bg text-white shadow-md sticky top-0 z-50">
        <div class="px-6 h-20 flex items-center justify-between">
            <h1 class="text-lg font-bold">應用電腦視覺技術之臺灣鹿發情監測與繁殖管理系統</h1>
            <nav class="hidden xl:flex space-x-8 text-sm font-medium">
                <a href="index.html" class="nav-link flex items-center"><i class="fa-solid fa-house mr-2 text-xs"></i>首頁</a>
                <a href="2.html" class="nav-link flex items-center">鹿舍總覽</a>
                <a href="3.html" class="nav-link flex items-center">鹿隻履歷登記</a>
                <a href="4.html" class="nav-active flex items-center">發情記錄管理</a>
            </nav>
            <div class="flex items-center space-x-4 border-l border-white/20 pl-6 text-right">
                <span class="text-sm font-bold uppercase">李仲琨</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10 text-center">
            <div class="bg-white p-6 rounded-2xl card-shadow border-b-4 border-red-400">
                <p class="text-[11px] text-gray-400 font-bold mb-3 uppercase tracking-wider">今日爬跨次數 (Mounting)</p>
                <p id="cnt-m" class="text-3xl font-black text-red-600">0 <span class="text-xs font-normal">次</span></p>
            </div>
            <div class="bg-white p-6 rounded-2xl card-shadow border-b-4 border-amber-400">
                <p class="text-[11px] text-gray-400 font-bold mb-3 uppercase tracking-wider">今日站立發情次數 (Standing)</p>
                <p id="cnt-s" class="text-3xl font-black text-amber-600">0 <span class="text-xs font-normal">次</span></p>
            </div>
            <div class="bg-white p-6 rounded-2xl card-shadow border-b-4 border-blue-400">
                <p class="text-[11px] text-gray-400 font-bold mb-3 uppercase tracking-wider">今日雄性追隨次數 (FO)</p>
                <p id="cnt-f" class="text-3xl font-black text-blue-600">0 <span class="text-xs font-normal">次</span></p>
            </div>
            <div class="bg-white p-6 rounded-2xl card-shadow border-b-4 border-green-500">
                <p class="text-[11px] text-gray-400 font-bold mb-3 uppercase tracking-wider">今日全場總活動指標</p>
                <p class="text-3xl font-black text-green-600">8,542 <span class="text-xs font-normal text-gray-400">指標</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white p-8 rounded-2xl card-shadow">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-xl font-bold text-gray-800">歷史環境活動量波形</h2>
                    <div class="flex items-center space-x-3">
                        <label class="text-xs text-gray-400">選擇判定鹿隻編號：</label>
                        <select id="deerSelect" class="bg-amber-50 border border-amber-200 text-[#8B6B4D] text-sm font-bold rounded-lg px-4 py-2 outline-none cursor-pointer"></select>
                    </div>
                </div>
                <div id="activityChart" style="width: 100%; height: 400px;"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl card-shadow border-l-4 border-[#8B6B4D]">
                <h2 class="text-lg font-bold mb-6 flex items-center"><i class="fa-solid fa-list-ul mr-3 text-[#8B6B4D]"></i>YOLO 即時串流識別日誌</h2>
                <div class="space-y-4 h-[350px] overflow-y-auto pr-2" id="logBox"></div>
                <button id="aiBtn" class="w-full mt-6 py-4 bg-[#8B6B4D] text-white rounded-xl text-sm font-bold shadow-lg hover:bg-[#72563D] transition">調度 AI Agent 產出行為分析報告</button>
            </div>
        </div>
    </main>

    <div id="aiModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
        <div class="bg-white w-full max-w-lg p-8 rounded-2xl shadow-2xl transform transition-all border-t-8 border-[#8B6B4D]">
            <div class="flex items-center space-x-3 mb-4 text-[#8B6B4D] text-xl font-black">
                <i class="fa-solid fa-robot text-2xl"></i>
                <h3>應用電腦視覺 - 智能分析完成</h3>
            </div>
            <div id="aiText" class="text-sm text-gray-600 leading-relaxed whitespace-pre-line bg-gray-50 p-4 rounded-xl border border-gray-200 max-h-60 overflow-y-auto"></div>
            <button onclick="document.getElementById('aiModal').classList.add('hidden')" class="w-full mt-6 py-3 bg-gray-800 text-white font-bold rounded-xl text-sm hover:bg-gray-900 transition">確認並關閉報告</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://deer-backend-api.onrender.com/api";
        const activityChart = echarts.init(document.getElementById('activityChart'));

        activityChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: ['02/11', '02/12', '02/13', '02/14', '02/15', '02/16', '02/17'] },
            yAxis: { type: 'value', min: 0, max: 300 },
            series: [{ name: '每日總活動量', type: 'line', data: [112, 108, 125, 118, 121, 115, 110], smooth: true, lineStyle: { color: '#10b981' } }]
        });

        async function loadEstrusPage() {
            try {
                const resStats = await fetch(`${API_BASE}/estrus/stats`);
                const stats = await resStats.json();
                document.getElementById('cnt-m').innerHTML = `${stats.mounting_count} <span class="text-xs font-normal">次</span>`;
                document.getElementById('cnt-s').innerHTML = `${stats.standing_count} <span class="text-xs font-normal">次</span>`;
                document.getElementById('cnt-f').innerHTML = `${stats.fo_count} <span class="text-xs font-normal">次</span>`;

                const resDeer = await fetch(`${API_BASE}/deer`);
                const deerList = await resDeer.json();
                const select = document.getElementById('deerSelect');
                select.innerHTML = "";
                deerList.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.deer_id; opt.innerText = `${d.deer_id} (${d.gender})`;
                    select.appendChild(opt);
                });

                const resLogs = await fetch(`${API_BASE}/estrus/logs`);
                const logs = await resLogs.json();
                const logBox = document.getElementById('logBox');
                logBox.innerHTML = logs.map(l => `
                    <div class="p-3 bg-blue-50/70 rounded-xl border border-blue-100/50 mb-2 text-xs">
                        <div class="flex justify-between font-bold text-blue-600 mb-1">
                            <span>${l.behavior_type=='Mounting'?'爬跨/騎乘':l.behavior_type=='Standing'?'站立發情':l.behavior_type=='FO'?'雄性追隨':'日常狀態'}</span>
                            <span class="text-gray-400 font-normal">${l.time}</span>
                        </div>
                        <p class="text-gray-800 font-semibold">鹿隻標籤: ${l.deer_id}</p>
                        <p class="text-gray-400">電腦視覺行為追蹤計時: ${l.duration} 秒</p>
                    </div>`).join('');
            } catch(e) { console.error(e); }
        }

        document.getElementById('aiBtn').onclick = async () => {
            const deerId = document.getElementById('deerSelect').value;
            if (!deerId) return;
            
            const btn = document.getElementById('aiBtn');
            btn.innerText = "AI 正在分析特徵軌跡中..."; btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/ai/analyze/${deerId}`, { method: 'POST' });
                const data = await res.json();
                
                document.getElementById('aiText').innerText = data.report;
                document.getElementById('aiModal').classList.remove('hidden');
            } catch(e) { alert("Agent連線異常"); }
            finally { btn.innerText = "調度 AI Agent 產出行為分析報告"; btn.disabled = false; }
        };

        loadEstrusPage();
    </script>
</body>
</html>
