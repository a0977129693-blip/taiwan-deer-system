<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>應用電腦視覺技術之臺灣鹿發情監測與繁殖管理系統 - 鹿舍總覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f2efea; }
        .sidebar-bg { background-color: #8B6B4D; }
        .nav-link:hover { color: #fcd34d; border-bottom: 2px solid #fcd34d; padding-bottom: 4px; transition: all 0.2s; }
        .nav-active { color: #fcd34d; border-bottom: 2px solid #fcd34d; padding-bottom: 4px; }
        .deer-btn { transition: all 0.2s; border: 1px solid rgba(139, 107, 77, 0.2); width: 100%; text-align: center; padding: 0.5rem 0; border-radius: 0.5rem; font-family: monospace; }
        .deer-btn-active { background-color: #8B6B4D; color: white; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="font-sans text-gray-700">

    <header class="sidebar-bg text-white shadow-md sticky top-0 z-50">
        <div class="px-6 h-20 flex items-center justify-between">
            <h1 class="text-lg font-bold leading-tight">應用電腦視覺技術之臺灣鹿發情監測與繁殖管理系統</h1>
            <nav class="hidden xl:flex space-x-8 text-sm font-medium">
                <a href="index.html" class="nav-link flex items-center"><i class="fa-solid fa-house mr-2 text-xs"></i>首頁</a>
                <a href="2.html" class="nav-active flex items-center">鹿舍總覽</a>
                <a href="3.html" class="nav-link flex items-center">鹿隻履歷登記</a>
                <a href="4.html" class="nav-link flex items-center">發情記錄管理</a>
            </nav>
            <div class="flex items-center space-x-4 border-l border-white/20 pl-6"><span class="text-sm font-bold">李仲琨</span></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8 flex space-x-8">
        <div class="w-64 flex-shrink-0">
            <div class="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm space-y-4">
                <div>
                    <h3 class="text-center font-bold text-gray-400 text-xs uppercase tracking-wider mb-2 border-b pb-1">公鹿分欄</h3>
                    <div id="maleContainer" class="space-y-1"></div>
                </div>
                <div>
                    <h3 class="text-center font-bold text-gray-400 text-xs uppercase tracking-wider mb-2 border-b pb-1">母鹿分欄</h3>
                    <div id="femaleContainer" class="space-y-1"></div>
                </div>
            </div>
        </div>

        <div class="flex-1">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="flex border-b text-sm" id="tabHeader">
                    <button onclick="switchTab('profile')" id="tab-profile" class="px-6 py-4 text-blue-600 border-b-2 border-blue-600 font-bold">基本履歷資料</button>
                    <button onclick="switchTab('estrus')" id="tab-estrus" class="px-6 py-4 text-gray-400 border-b-2 border-transparent hover:text-gray-600">視覺發情紀錄</button>
                    <button onclick="switchTab('activity')" id="tab-activity" class="px-6 py-4 text-gray-400 border-b-2 border-transparent hover:text-gray-600">特徵行為比例</button>
                    <button onclick="switchTab('breeding')" id="tab-breeding" class="px-6 py-4 text-gray-400 border-b-2 border-transparent hover:text-gray-600">歷年繁育配種</button>
                    <button onclick="switchTab('monitor')" id="tab-monitor" class="px-6 py-4 text-gray-400 border-b-2 border-transparent hover:text-gray-600">智慧視訊串流</button>
                </div>
                <div class="p-6" id="tabContent"></div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "https://deer-backend-api.onrender.com/api";
        let allDeers = [];
        let activeDeerId = "";
        let activeTab = "profile";

        async function fetchSystemDeers() {
            try {
                const res = await fetch(`${API_BASE}/deer`);
                allDeers = await res.json();
                
                const mBox = document.getElementById('maleContainer');
                const fBox = document.getElementById('femaleContainer');
                mBox.innerHTML = ""; fBox.innerHTML = "";

                allDeers.forEach((d, idx) => {
                    const btn = document.createElement('button');
                    btn.id = `deer-${d.deer_id}`;
                    btn.className = "deer-btn bg-gray-50 text-gray-600";
                    btn.innerText = `耳標: ${d.deer_id}`;
                    btn.onclick = () => selectDeerNode(d.deer_id);
                    
                    if(d.gender === "公鹿") mBox.appendChild(btn);
                    else fBox.appendChild(btn);
                    
                    if(idx === 0) activeDeerId = d.deer_id;
                });

                if(activeDeerId) selectDeerNode(activeDeerId);
            } catch (err) { console.error("同步Supabase鹿隻出錯:", err); }
        }

        function selectDeerNode(id) {
            activeDeerId = id;
            document.querySelectorAll('.deer-btn').forEach(b => b.classList.remove('deer-btn-active', 'bg-white'));
            const targetBtn = document.getElementById(`deer-${id}`);
            if(targetBtn) targetBtn.classList.add('deer-btn-active');
            renderTabContent();
        }

        function switchTab(tabName) {
            activeTab = tabName;
            document.querySelectorAll('#tabHeader button').forEach(b => {
                b.classList.remove('text-blue-600', 'border-blue-600', 'font-bold');
                b.classList.add('text-gray-400', 'border-transparent');
            });
            const t = document.getElementById(`tab-${tabName}`);
            t.classList.remove('text-gray-400', 'border-transparent');
            t.classList.add('text-blue-600', 'border-blue-600', 'font-bold');
            renderTabContent();
        }

        async function renderTabContent() {
            const container = document.getElementById('tabContent');
            const deer = allDeers.find(d => d.deer_id === activeDeerId);
            if(!deer) { container.innerHTML = "<p class='text-gray-400 text-center py-6'>請先自左側選單選擇茸鹿目標</p>"; return; }

            if(activeTab === "profile") {
                container.innerHTML = `
                    <table class="w-full text-left text-sm border-collapse">
                        <tbody class="text-gray-600">
                            <tr class="border-b"><td class="py-4 font-semibold w-1/3">耳標晶片識別碼</td><td class="py-4 font-mono text-blue-600 font-bold">${deer.deer_id}</td></tr>
                            <tr class="border-b"><td class="py-4 font-semibold">能量體重數據</td><td>${deer.weight} kg</td></tr>
                            <tr class="border-b"><td class="py-4 font-semibold">出生日期登記</td><td>${deer.birthday}</td></tr>
                            <tr class="border-b"><td class="py-4 font-semibold">血統關聯親代</td><td>父畜: ${deer.father_id || '未知'} / 母畜: ${deer.mother_id || '未知'}</td></tr>
                            <tr class="border-b"><td class="py-4 font-semibold">目前配屬欄位</td><td><span class="px-3 py-1 bg-amber-100 text-amber-800 rounded-full font-bold text-xs">${deer.pen_id} 欄位</span></td></tr>
                        </tbody>
                    </table>`;
            }
            else if(activeTab === "estrus") {
                const res = await fetch(`${API_BASE}/deer/${activeDeerId}/details?tab=estrus`);
                const logs = await res.json();
                container.innerHTML = `
                    <table class="w-full text-left text-sm">
                        <thead><tr class="text-gray-400 border-b"><th class="pb-3">特徵動作識別</th><th class="pb-3">監測時間點</th><th class="pb-3">YOLO模型置信度</th></tr></thead>
                        <tbody class="text-gray-600">
                            ${logs.map(l => `<tr class="border-b"><td class="py-3 font-bold ${l.event=='Mounting'?'text-red-500':'text-blue-500'}">${l.event=='Mounting'?'爬跨/騎乘 (Mounting)':'雄性追隨 (FO)'}</td><td class="py-3">${l.time}</td><td class="py-3 font-mono text-green-600">${(l.conf*100).toFixed(0)}%</td></tr>`).join('')}
                        </tbody>
                    </table>`;
            }
            else if(activeTab === "activity") {
                container.innerHTML = `<div id="pieContainer" style="width:100%; height:360px;"></div>`;
                const res = await fetch(`${API_BASE}/deer/${activeDeerId}/details?tab=activity`);
                const data = await res.json();
                const chart = echarts.init(document.getElementById('pieContainer'));
                chart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c} 秒 ({d}%)' },
                    legend: { bottom: '0%', textStyle: { fontSize: 11 } },
                    series: [{ type: 'pie', radius: '55%', data: data, label: { show: true, formatter: '{b}\n{d}%' } }]
                });
            }
            else if(activeTab === "breeding") {
                const res = await fetch(`${API_BASE}/deer/${activeDeerId}/details?tab=breeding`);
                const list = await res.json();
                container.innerHTML = list.length ? `
                    <table class="w-full text-left text-sm">
                        <tbody>
                            ${list.map(l => `<tr class="border-b"><td class="py-4 font-bold text-gray-700">第 ${l.index} 胎次繁育交尾</td><td class="text-gray-400">${l.date}</td><td class="text-green-600 font-bold text-right">${l.status}</td></tr>`).join('')}
                        </tbody>
                    </table>` : `<p class="text-gray-400 text-center py-8">該個體目前尚無成功孕產胎次紀錄。</p>`;
            }
            else if(activeTab === "monitor") {
                container.innerHTML = `
                    <div class="relative bg-black rounded-2xl overflow-hidden aspect-video flex items-center justify-center border-4 border-gray-800 shadow-inner">
                        <div class="absolute top-4 left-4 bg-red-600 text-white text-[10px] px-2 py-0.5 rounded font-bold tracking-wider animate-pulse">● LIVE STREAMING</div>
                        <div class="text-center text-gray-600"><i class="fa-solid fa-circle-dot text-4xl mb-2 animate-ping text-red-500"></i><p class="text-xs font-mono">RTSP FEED: PEN_${deer.pen_id}_YOLO_POSE</p></div>
                    </div>`;
            }
        }

        loadSystemDeers();
    </script>
</body>
</html>
