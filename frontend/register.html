<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧茸鹿管理系統 - 註冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f2efea] flex items-center justify-center min-h-screen p-4">
    <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-xl">
        <h2 class="text-2xl font-black text-gray-800 text-center mb-6">註冊管理員帳戶</h2>
        <form id="regForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">管理者用戶名</label>
                <input type="text" id="username" required class="w-full px-4 py-2.5 border rounded-xl text-sm outline-none focus:border-[#8B6B4D]">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">電子郵件</label>
                <input type="email" id="email" class="w-full px-4 py-2.5 border rounded-xl text-sm outline-none focus:border-[#8B6B4D]" placeholder="optional">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">安全密碼</label>
                <input type="password" id="password" required class="w-full px-4 py-2.5 border rounded-xl text-sm outline-none focus:border-[#8B6B4D]">
            </div>
            <button type="submit" class="w-full py-3 bg-[#8B6B4D] text-white font-bold rounded-xl text-sm">確認註冊</button>
        </form>
        <div class="text-center mt-4"><a href="login.html" class="text-xs text-gray-400 hover:underline">已有帳號？返回登入</a></div>
    </div>
    <script>
        const API_BASE = "https://deer-backend-api-t940.onrender.com/api";
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value, email: document.getElementById('email').value })
            });
            if(res.ok) { alert("註冊成功！自動引導至登入畫面。"); window.location.href = 'login.html'; }
            else { const d = await res.json(); alert(d.detail || "註冊失敗"); }
        };
    </script>
</body>
</html>
